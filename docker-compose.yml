# Infra tier for Deputy.
# The API + web run on the HOST (deputy up) because the agent runtime needs your
# `claude` auth, your repos at their real paths, and each project's toolchain.
# This compose file owns only the stateful infra: Postgres.
#
#   docker compose up -d db      # start just the database
#   docker compose down          # stop (data persists in $DEPUTY_HOME/pgdata)

name: deputy

services:
  db:
    image: postgres:16-alpine
    container_name: deputy-pg
    environment:
      POSTGRES_USER: loop
      POSTGRES_PASSWORD: loop
      POSTGRES_DB: loop
    ports:
      - "5433:5432" # matches DATABASE_URL in .env (host connects on 5433)
    volumes:
      # Data lives in the user's home dir ($DEPUTY_HOME, default ~/.deputy), not a
      # Docker-managed volume — visible, backup-able, survives everything.
      - "${DEPUTY_HOME:-/root/.deputy}/pgdata:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loop -d loop"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped
